<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Zevoir Query Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0b0e14;
      color: #cdd6f4;
      font-family: monospace;
      height: 100vh;
      display: flex;
      justify-content: center;
    }
    .app {
      width: 700px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #1e2535;
      border-right: 1px solid #1e2535;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: #111520;
      border-bottom: 1px solid #1e2535;
    }
    .title {
      font-size: 1.2rem;
      font-weight: bold;
      color: #00e5ff;
    }
    header button {
      background: transparent;
      border: 1px solid #1e2535;
      color: #555e7a;
      padding: 6px 14px;
      cursor: pointer;
      border-radius: 6px;
    }
    header button:hover { color: #ff4f6d; border-color: #ff4f6d; }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.user { flex-direction: row-reverse; }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: bold;
      flex-shrink: 0;
    }
    .avatar.bot  { background: #0a2a1a; color: #39ff14; border: 1px solid #1a4a2a; }
    .avatar.user { background: #0a1a2a; color: #00e5ff; border: 1px solid #1a3a4a; }
    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: break-word;
    }
    .bubble.bot  { background: #0a1a12; color: #b8ffcd; border: 1px solid #1a3a22; }
    .bubble.user { background: #0d1b2a; color: #00e5ff; border: 1px solid #1a3a4a; }
    .bubble.loading {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #39ff14;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }
    .input-bar {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      background: #111520;
      border-top: 1px solid #1e2535;
    }
    #msg-input {
      flex: 1;
      background: #0b0e14;
      border: 1px solid #1e2535;
      border-radius: 8px;
      padding: 10px 14px;
      color: white;
      font-family: monospace;
      font-size: 0.9rem;
      outline: none;
    }
    #msg-input:focus { border-color: #00e5ff; }
    #send-btn {
      background: #00e5ff;
      color: black;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-weight: bold;
      cursor: pointer;
    }
    #send-btn:hover    { background: #00b8cc; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title">Zevoir Query Chatbot</div>
      <button onclick="clearChat()">Clear</button>
    </header>
    <div id="chat"></div>
    <div class="input-bar">
      <input id="msg-input" type="text" placeholder="Type a userId (e.g. 1)..."/>
      <button id="send-btn" onclick="sendMessage()">SEND</button>
    </div>
  </div>

<script>
  const chat      = document.getElementById('chat');
  const input     = document.getElementById('msg-input');
  const sendBtn   = document.getElementById('send-btn');
  const queryCounts = {};
  const MAX_QUERIES = 10;
  const STORAGE_KEY = 'zevoir_chat_history';

  // Welcome message shown at the start
  const WELCOME_TEXT = "👋 Hey there! Welcome to Zevoir Query Chatbot!\n\nI can look up todo summaries for any user.\nJust type a number from 1 to 10 and I'll get the details for you! 😊";

  // ── Save history to localStorage ──────────────────────────────────────────
  function saveHistory(text, role) {
    const history = getHistory();
    history.push({ text, role });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  }

  function getHistory() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch {
      return [];
    }
  }

  // ── Add a message bubble to the chat ──────────────────────────────────────
  function addMessage(text, role, save = true) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + role;
    avatar.textContent = role === 'user' ? 'YOU' : 'BOT';

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + role;
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;

    // Save to localStorage so history survives refresh
    if (save) saveHistory(text, role);
  }

  // ── Restore history on page load ───────────────────────────────────────────
  function restoreHistory() {
    const history = getHistory();
    if (history.length === 0) {
      // No history — show welcome message for the first time
      addMessage(WELCOME_TEXT, 'bot');
    } else {
      // Restore all previous messages without re-saving them
      history.forEach(msg => addMessage(msg.text, msg.role, false));
    }
  }

  // ── Loading dots ───────────────────────────────────────────────────────────
  function showLoading() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'loading-row';

    const avatar = document.createElement('div');
    avatar.className = 'avatar bot';
    avatar.textContent = 'BOT';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bot loading';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    row.appendChild(avatar);
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeLoading() {
    const el = document.getElementById('loading-row');
    if (el) el.remove();
  }

  // ── Main send function ─────────────────────────────────────────────────────
  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    // Check if same number typed more than 10 times
    if (!isNaN(text)) {
      queryCounts[text] = (queryCounts[text] || 0) + 1;
      if (queryCounts[text] > MAX_QUERIES) {
        addMessage(text, 'user');
        input.value = '';
        addMessage(`Looks like you really love userId ${text}! 😄 You've searched it more than 10 times. How about trying a different userId from 1 to 10?`, 'bot');
        return;
      }
    }

    addMessage(text, 'user');
    input.value = '';
    input.disabled = true;
    sendBtn.disabled = true;
    showLoading();

    try {
      const res = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      setTimeout(() => {
        removeLoading();
        if (!res.ok) {
          addMessage('⚠️ Oops! Something went wrong on the server (HTTP ' + res.status + '). Please try again in a moment!', 'bot');
          input.disabled = false;
          sendBtn.disabled = false;
          input.focus();
          return;
        }
        res.json().then(data => {
          addMessage(data.reply, 'bot');
          input.disabled = false;
          sendBtn.disabled = false;
          input.focus();
        });
      }, 1000);

    } catch (err) {
      setTimeout(() => {
        removeLoading();
        addMessage('⚠️ Hmm, I could not connect to the server. Please make sure it is running and try again!', 'bot');
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
      }, 1000);
      console.error('Fetch error:', err);
    }
  }

  // ── Clear chat ─────────────────────────────────────────────────────────────
  function clearChat() {
    chat.innerHTML = '';
    localStorage.removeItem(STORAGE_KEY);
    // Show welcome message again after clearing
    addMessage(WELCOME_TEXT, 'bot');
  }

  // ── Enter key ──────────────────────────────────────────────────────────────
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendMessage();
  });

  // ── Load history when page opens ───────────────────────────────────────────
  restoreHistory();
</script>
</body>
</html>
