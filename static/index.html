<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Zevoir Genie</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── LIGHT THEME (default) ── */
    body {
      background: #e8edf3;
      color: #1a1a2e;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.3s, color 0.3s;
    }

    /* App is smaller and floating — not touching edges */
    .app {
      width: 480px;
      height: 82vh;
      display: flex;
      flex-direction: column;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      border: 1px solid #d0d7e3;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 18px;
      background: #ffffff;
      border-bottom: 1px solid #d0d7e3;
      transition: background 0.3s, border-color 0.3s;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Robot image */
    .bot-logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }

    .title {
      font-size: 1.1rem;
      font-weight: bold;
      color: #6c5ce7;
      font-family: Arial, sans-serif;
      transition: color 0.3s;
    }

    .header-buttons {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── TOGGLE SWITCH ── */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .theme-label { font-size: 0.8rem; }

    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      inset: 0;
      background: #d0d7e3;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    .switch input:checked + .slider { background: #1e2535; }
    .switch input:checked + .slider::before { transform: translateX(18px); }

    /* Clear button */
    .clear-btn {
      background: transparent;
      border: 1px solid #d0d7e3;
      color: #888;
      padding: 5px 12px;
      cursor: pointer;
      border-radius: 6px;
      font-family: Arial, sans-serif;
      font-size: 0.8rem;
      transition: color 0.3s, border-color 0.3s, background 0.3s;
    }

    .clear-btn:hover { color: #e74c3c; border-color: #e74c3c; }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #f0f4f8;
      transition: background 0.3s;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: #d0d7e3; border-radius: 4px; }

    .msg-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      background: #ffffff;
      border: 1px solid #d0d7e3;
      transition: background 0.3s, border-color 0.3s;
    }

    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.82rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: break-word;
      font-family: Arial, sans-serif;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }

    .bubble.bot  { background: #ffffff; color: #1a1a2e; border: 1px solid #d0d7e3; }
    .bubble.user { background: #6c5ce7; color: #ffffff; border: 1px solid #5a4bd1; }

    .bubble.loading {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #6c5ce7;
      animation: bounce 1.2s ease-in-out infinite;
      transition: background 0.3s;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }

    .input-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #ffffff;
      border-top: 1px solid #d0d7e3;
      transition: background 0.3s, border-color 0.3s;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: #f0f4f8;
      border: 1px solid #d0d7e3;
      border-radius: 8px;
      padding: 9px 12px;
      color: #1a1a2e;
      font-family: Arial, sans-serif;
      font-size: 0.85rem;
      outline: none;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }

    #msg-input:focus { border-color: #6c5ce7; }
    #msg-input::placeholder { color: #aaa; }

    #send-btn {
      background: #6c5ce7;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-weight: bold;
      font-family: Arial, sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.3s, opacity 0.3s;
    }

    #send-btn:hover    { background: #5a4bd1; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── DARK THEME ── */
    body.dark { background: #060a10; color: #cdd6f4; }
    body.dark .app { border-color: #1e2535; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    body.dark header { background: #111520; border-color: #1e2535; }
    body.dark .title { color: #00e5ff; }

    /* Highlighted clear button in dark mode */
    body.dark .clear-btn {
      border-color: #00e5ff;
      color: #00e5ff;
      background: rgba(0,229,255,0.08);
    }
    body.dark .clear-btn:hover {
      color: #ff4f6d;
      border-color: #ff4f6d;
      background: rgba(255,79,109,0.08);
    }

    body.dark #chat { background: #0b0e14; }
    body.dark .avatar { background: #0a1a2a; border-color: #1a3a4a; }
    body.dark .avatar.bot { background: #0a2a1a; color: #39ff14; border-color: #1a4a2a; }
    body.dark .avatar.user { background: #0a1a2a; color: #00e5ff; border-color: #1a3a4a; }
    body.dark .bubble.bot { background: #0a1a12; color: #b8ffcd; border-color: #1a3a22; }
    body.dark .bubble.user { background: #0d1b2a; color: #00e5ff; border-color: #1a3a4a; }
    body.dark .dot { background: #39ff14; }
    body.dark .input-bar { background: #111520; border-color: #1e2535; }
    body.dark #msg-input { background: #0b0e14; border-color: #1e2535; color: white; }
    body.dark #msg-input:focus { border-color: #00e5ff; }
    body.dark #send-btn { background: #00e5ff; color: black; }
    body.dark #send-btn:hover { background: #00b8cc; }
    body.dark .theme-label { color: #555e7a; }
  </style>
</head>

<script>
  const chat      = document.getElementById('chat');
  const input     = document.getElementById('msg-input');
  const sendBtn   = document.getElementById('send-btn');
  const queryCounts = {};
  const MAX_QUERIES = 10;
  const STORAGE_KEY = 'zevoir_chat_history';
  const THEME_KEY   = 'zevoir_theme';

  const WELCOME_TEXT = "👋 Hey there! Welcome to Zevoir Support!\n\nI can look up todo summaries for any user.\nJust type a number from 1 to 10 and I'll get the details for you! 😊";

  function toggleTheme() {
    const isDark = document.getElementById('theme-toggle').checked;
    if (isDark) {
      document.body.classList.add('dark');
      localStorage.setItem(THEME_KEY, 'dark');
    } else {
      document.body.classList.remove('dark');
      localStorage.setItem(THEME_KEY, 'light');
    }
  }

  function loadTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('theme-toggle').checked = true;
    }
  }

  function saveHistory(text, role) {
    const history = getHistory();
    history.push({ text, role });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  }

  function getHistory() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch { return []; }
  }

  function addMessage(text, role, save = true) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;
    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + role;
    avatar.textContent = role === 'user' ? '🧑' : '🤖';
    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + role;
    bubble.textContent = text;
    row.appendChild(avatar);
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
    if (save) saveHistory(text, role);
  }

  function restoreHistory() {
    const history = getHistory();
    if (history.length === 0) {
      addMessage(WELCOME_TEXT, 'bot');
    } else {
      history.forEach(msg => addMessage(msg.text, msg.role, false));
    }
  }

  function showLoading() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'loading-row';
    const avatar = document.createElement('div');
    avatar.className = 'avatar bot';
    avatar.textContent = '🤖';
    const bubble = document.createElement('div');
    bubble.className = 'bubble bot loading';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    row.appendChild(avatar);
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeLoading() {
    const el = document.getElementById('loading-row');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    if (!isNaN(text)) {
      queryCounts[text] = (queryCounts[text] || 0) + 1;
      if (queryCounts[text] > MAX_QUERIES) {
        addMessage(text, 'user');
        input.value = '';
        addMessage(`Looks like you really love userId ${text}! 😄 You've searched it more than 10 times. How about trying a different userId from 1 to 10?`, 'bot');
        return;
      }
    }

    addMessage(text, 'user');
    input.value = '';
    input.disabled = true;
    sendBtn.disabled = true;
    showLoading();

    try {
      const res = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      setTimeout(() => {
        removeLoading();
        if (!res.ok) {
          addMessage('⚠️ Oops! Something went wrong on the server (HTTP ' + res.status + '). Please try again!', 'bot');
          input.disabled = false;
          sendBtn.disabled = false;
          input.focus();
          return;
        }
        res.json().then(data => {
          addMessage(data.reply, 'bot');
          input.disabled = false;
          sendBtn.disabled = false;
          input.focus();
        });
      }, 1000);
    } catch (err) {
      setTimeout(() => {
        removeLoading();
        addMessage('⚠️ Hmm, I could not connect to the server. Please make sure it is running and try again!', 'bot');
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
      }, 1000);
      console.error('Fetch error:', err);
    }
  }

  function clearChat() {
    chat.innerHTML = '';
    localStorage.removeItem(STORAGE_KEY);
    addMessage(WELCOME_TEXT, 'bot');
  }

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendMessage();
  });

  loadTheme();
  restoreHistory();
</script>
</body>
</html>
